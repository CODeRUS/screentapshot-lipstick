name: Github CI build

on:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - master
      
env:
  RELEASE: 4.6.0.13

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Prepare sfos 4 build
      run: rm -rf RPMS
      
    - name: Build i486
      uses: coderus/github-sfos-build@master
      with:
        release: ${{ env.RELEASE }}
        arch: i486
      
    - name: Upload build result
      uses: actions/upload-artifact@v4
      with:
        name: sfos4
        path: RPMS

    - name: Create release
      if: contains(github.ref, 'release')
      run: |
        set -x
        assets=()
        for asset in RPMS/*.rpm; do
          assets+=("$asset")
        done
        tag_name="${GITHUB_REF##*/}"
        gh release create "${tag_name}_${RELEASE}" "${assets[@]}" --title "$tag_name $RELEASE"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
